  const main = document.getElementById('mainArea');
  const secHtml = m.sections.map((s,si)=>`
    <div class="acc">
      <div class="acc-hd ${si===0?'open':''}" onclick="toggleSection(this)">
        <span class="acc-title">${s.title}</span>
        <span class="acc-arr ${si===0?'open':''}">▼</span>
      </div>
      <div class="acc-body ${si===0?'open':''}">${s.content}</div>
    </div>
  `).join('');
  
  const qr = getQuickReview(idx);
  
  main.innerHTML = `
    <div class="mod-head">
      <div class="mod-tag">${m.emoji} Module ${m.id}</div>
      <h2>${m.title}</h2>
      <p class="sub">${m.subtitle}</p>
    </div>
    ${secHtml}
    <div class="qr">
      <h4>⚡ Quick Revision Snapshot</h4>
      <ul>${qr.map(r=>`<li>${r}</li>`).join('')}</ul>
    </div>
    <div style="height:48px;"></div>
  `;
}

    ["Early-stage valuation is subjective — driven by investor mood and market trends","P/E = Market Price ÷ EPS; P/B = Market Price ÷ Book Value per share","Use EV/EBITDA for slightly profitable startups; EV/Sales for loss-making ones","Post-Money = Investment ÷ Equity %; Pre-Money = Post-Money − Investment","Dilution reduces % ownership but increases absolute share value","Convertibles: delay valuation fight; convert based on future performance","Raise small amounts early, large amounts later = minimize total dilution"],
    ["Cash Budget = actual receipts and payments only (ignore accounting distinctions)","Peak Operational Cash Deficit = maximum funding you must raise","Associate capacity: 160hrs ÷ 16hrs per client = 10 clients per associate","Revenue = Clients × ₹25,000; Associates needed = Clients ÷ 10","Total Funding = Peak Deficit + Infra Cost + Technology Investment","Crazy path breaks linear cost model with ₹10Cr one-time tech investment","Always prioritize cash buffer (adequacy) over minimizing dilution"],
    ["Rich vs King: wealth creation (give control) vs control retention (slower growth)","Term Sheet is NON-BINDING — except Exclusivity and Confidentiality clauses","Staging: installment funding tied to achieving specific milestones","Veto rights (Affirmative Covenants) protect minority investors on key decisions","Drag-Along forces founders to sell; Tag-Along lets investors join founder's sale","Non-Participating LP: choose higher of multiple OR equity %; Participating = both!","Full Ratchet = harsh on founders; Weighted Average = fairer in down rounds"],
    ["IPO: highest returns, 8-12 months, costs 7-10%, requires RHP (450-500 pages)","Trade Sale: fast (1 month), cheaper, but founder usually exits in 1-2 years","Secondary: early investor sells to later-stage financial investor; founder stays","Buyback: capped at 25% of share capital by Companies Act Section 68","Self-Liquidating: preference shares redeemed from operating cash flows","Private markets are opaque — network continuously to track valuation trends","Securing adequate capital > fighting for minor valuation increments"],
    ["Hierarchy: Internal Accruals → Debt → Equity (cheapest to most expensive)","Venture Debt: 14-18% bridge financing before equity rounds to minimize dilution","TAM = total global market; SAM = your target slice; SOM = what you can win now","M&A: Physics (fit) + Chemistry (culture) + Maths (valuation) — in that order","Warm introductions have the highest conversion rate for investor outreach","Due Diligence: Commercial DD + Financial DD (normalized P&L) + Legal DD","Deal closed ONLY when cash hits the bank — not when SHA is signed"],
    ["Private Limited Company is the ONLY structure suitable for VC funding","INC-20A must be filed BEFORE starting business or borrowing — don't skip this!","DPIIT registration unlocks: Convertible Notes, promoter ESOPs, tax holidays","MSME: 45-day payment protection — corporates must clear dues within 45 days","Private Placement needs: 75% special resolution + escrow account + valuation report","ESOPs: minimum 1-year cliff; DPIIT startups can give ESOPs to promoters (10 years)","Unregistered IP = deal killer during due diligence; file trademarks/patents early"],
    ["VC funds in India = AIFs (SEBI-regulated); Management Fee + 20% Carry","CCPS (Compulsorily Convertible Preference Shares) = standard VC instrument in India","Nominee Directors owe fiduciary duty to the COMPANY, not just their investor","Reserved Matters (Affirmative Covenants) = investor veto on major decisions","IP Assignment clause in all employment agreements is non-negotiable","POSH Act mandatory for ALL companies (even 1 employee); 10+ = Internal Committee","Non-compete clauses largely unenforceable in India; focus on non-solicitation instead"]

  return reviews[idx] || [];
}

buildNav();
renderModule(0);
